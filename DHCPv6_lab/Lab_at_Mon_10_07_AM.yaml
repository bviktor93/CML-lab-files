  - border_color: '#00000000'
    border_style: ''
    color: '#FFFFFF'
    rotation: 0
    text_bold: false
    text_content: |-
      Task1: Configure R4 as a Stateless DHCPv6 server
      as the following:
      ipv6 dhcp pool POOL1
       dns-server 2025:1:2:3::4
       domain-name testing.com
      int g0/0
       ipv6 dhcp server POOL1
      (R4 should not provide address prefixes for POOL1!)
      (do not configure 'ipv6 unicast-routing' on R4!)
      Configure R3 so that he informs hosts in the RA
      messages so that they should use DHCPv6 to obtain
      additional information from DHCPv6 servers such as
      DNS-servers, and domain-names:
      int g0/0
       ipv6 nd other-config-flag
      (this sets the 'O' bit to 1, ensure that the 'M'
      bit is not set on the same interface!)
      Use 'debug ipv6 nd' and 'debug ipv6 dhcp' on R1,
      R3, and R4. Start a packet capture between R1 and
      the switch to examine DHCPv6 messages
    text_font: monospace
    text_italic: false
    text_size: 12
    text_unit: pt
