    color: '#FFFF00'
    rotation: 0
    text_bold: false
    text_content: |-
      Task2: Configure R5 as a Stateful DHCP server
      and R3 as a DHCP relay agent as the following:
      R5:
      ipv6 dhcp pool TEST1
       address prefix 2025:1:2:3::/64
       dns-server 5000::5
       domain-name R5domain.com
      int g0/0
       ipv6 dhcp server TEST1
      R3:
      int g0/0
       ipv6 dhcp relay destination  2025:1:3:5::5
      On R1: ipv6 address dhcp
      Examine 'debug ipv6 [detail]' output on R5 and R3,
      and run a packet capture between R3 and R5:
      examine 'SARR' DHCPv6 packets as they are unicast
      now.
    text_font: monospace
    text_italic: false
    text_size: 12
    text_unit: pt
    thickness: 1
    type: text
    x1: 253.07406791004382
    y1: -245.8643425178243
